<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWARE Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SF Mono', 'Fira Code', monospace; background: #0a0a0a; color: #e0e0e0; }
        .header { background: #111; border-bottom: 1px solid #333; padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
        .header h1 { font-size: 18px; color: #00ff88; font-weight: 600; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; animation: pulse 2s infinite; }
        .status-dot.offline { background: #ff4444; animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; max-width: 1400px; margin: 0 auto; }
        @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
        .card { background: #111; border: 1px solid #333; border-radius: 8px; padding: 16px; }
        .card h2 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .empty { color: #555; font-style: italic; font-size: 13px; }
        .full { grid-column: 1 / -1; }
        @media (max-width: 700px) { .full { grid-column: 1; } }

        .video-wrap { position: relative; background: #000; border-radius: 4px; overflow: hidden; aspect-ratio: 4/3; }
        .video-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .video-badge { position: absolute; top: 8px; left: 8px; background: #00ff8822; color: #00ff88; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
        .video-badge.offline { background: #ff444422; color: #ff4444; }

        .log-list { list-style: none; max-height: 250px; overflow-y: auto; font-size: 12px; }
        .log-item { display: flex; gap: 12px; padding: 4px 0; border-bottom: 1px solid #1a1a1a; align-items: center; }
        .log-time { color: #555; flex-shrink: 0; width: 80px; }
        .log-label { font-weight: 600; flex-shrink: 0; width: 100px; }
        .log-label.object { color: #00ff88; }
        .log-label.sound { color: #ffaa00; }
        .log-conf { color: #888; flex-shrink: 0; width: 45px; text-align: right; }
        .log-bar { flex: 1; min-width: 40px; height: 4px; background: #1a1a1a; border-radius: 2px; }
        .log-fill { height: 100%; border-radius: 2px; }
        .log-fill.object { background: #00ff88; }
        .log-fill.sound { background: #ffaa00; }

        .command-form { display: flex; gap: 8px; margin-top: 12px; }
        .command-input { flex: 1; background: #0a0a0a; border: 1px solid #333; border-radius: 4px; padding: 8px 12px; color: #e0e0e0; font-family: inherit; font-size: 13px; }
        .command-input:focus { outline: none; border-color: #00ff88; }
        .command-btn { background: #00ff88; color: #0a0a0a; border: none; border-radius: 4px; padding: 8px 16px; font-family: inherit; font-weight: 600; cursor: pointer; }
        .command-btn:hover { background: #00cc6a; }
        .command-feedback { margin-top: 8px; font-size: 12px; color: #00ff88; }

        .chart-wrap { height: 200px; position: relative; }

        .activity-list { list-style: none; max-height: 300px; overflow-y: auto; }
        .activity-item { padding: 6px 0; border-bottom: 1px solid #1a1a1a; font-size: 12px; display: flex; gap: 8px; align-items: baseline; }
        .activity-time { color: #555; flex-shrink: 0; width: 80px; }
        .activity-tag { padding: 1px 6px; border-radius: 3px; font-size: 11px; flex-shrink: 0; }
        .activity-tag.action { background: #ff880022; color: #ffaa00; }
        .activity-tag.rule { background: #00ff8822; color: #00ff88; }
        .activity-msg { color: #ccc; }

        @media (max-width: 700px) {
            .log-item { flex-wrap: wrap; gap: 4px; }
            .log-time { width: 60px; font-size: 11px; }
            .log-label { width: 80px; font-size: 11px; }
            .header h1 { font-size: 15px; }
            .card { padding: 10px; }
            .grid { gap: 10px; padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="status-dot" id="statusDot"></div>
        <h1>AWARE</h1>
        <span id="statusText" style="color: #888; font-size: 12px;">connecting...</span>
    </div>

    <div class="grid">
        <!-- Command -->
        <div class="card full">
            <h2>Command</h2>
            <div class="command-form">
                <input type="text" class="command-input" id="commandInput"
                       placeholder='e.g. "when person detected, say hello"'>
                <button class="command-btn" id="commandBtn">Teach</button>
            </div>
            <div class="command-feedback" id="commandFeedback"></div>
        </div>

        <!-- Camera -->
        <div class="card full">
            <h2>Camera</h2>
            <div class="video-wrap">
                <img id="videoFeed" src="/api/video" alt="Camera feed">
                <div class="video-badge" id="cameraBadge">connecting...</div>
            </div>
        </div>

        <!-- Object log -->
        <div class="card full">
            <h2>Object Log</h2>
            <ul class="log-list" id="objectLog">
                <li class="empty">waiting for detections...</li>
            </ul>
        </div>

        <!-- Sound log -->
        <div class="card full">
            <h2>Sound Log</h2>
            <ul class="log-list" id="soundLog">
                <li class="empty">waiting for sounds...</li>
            </ul>
        </div>

        <!-- Temperature chart -->
        <div class="card">
            <h2>Temperature</h2>
            <div class="chart-wrap">
                <canvas id="tempChart"></canvas>
            </div>
        </div>

        <!-- Distance chart -->
        <div class="card">
            <h2>Distance</h2>
            <div class="chart-wrap">
                <canvas id="distChart"></canvas>
            </div>
        </div>

        <!-- Activity log -->
        <div class="card full">
            <h2>Activity</h2>
            <ul class="activity-list" id="activityList">
                <li class="empty">no activity yet</li>
            </ul>
        </div>
    </div>

    <script>
        const API = window.location.origin;

        async function fetchJSON(path) {
            try {
                const r = await fetch(API + path);
                if (!r.ok) throw new Error(r.status);
                return await r.json();
            } catch (e) { return null; }
        }

        function setConnected(ok) {
            document.getElementById('statusDot').className = 'status-dot' + (ok ? '' : ' offline');
            document.getElementById('statusText').textContent = ok ? 'connected' : 'disconnected';
        }

        function timeStr(ts) { return ts ? new Date(ts * 1000).toLocaleTimeString() : '--'; }
        function pct(c) { return Math.round(c * 100); }

        // Camera badge
        async function updateBadge() {
            const data = await fetchJSON('/api/snapshot');
            if (!data) { setConnected(false); return; }
            setConnected(true);
            const badge = document.getElementById('cameraBadge');
            badge.textContent = data.source;
            badge.className = 'video-badge' + (data.source.includes('unavailable') || data.source === 'mock_camera' ? ' offline' : '');
        }

        // Object log
        async function updateObjectLog() {
            const data = await fetchJSON('/api/objects?limit=50');
            if (!data || !data.length) return;
            document.getElementById('objectLog').innerHTML = data.reverse().map(d =>
                `<li class="log-item"><span class="log-time">${timeStr(d.timestamp)}</span><span class="log-label object">${d.label}</span><span class="log-conf">${pct(d.confidence)}%</span><span class="log-bar"><span class="log-fill object" style="width:${pct(d.confidence)}%"></span></span></li>`
            ).join('');
        }

        // Sound log
        async function updateSoundLog() {
            const data = await fetchJSON('/api/sounds?limit=50');
            if (!data || !data.length) return;
            document.getElementById('soundLog').innerHTML = data.reverse().map(d =>
                `<li class="log-item"><span class="log-time">${timeStr(d.timestamp)}</span><span class="log-label sound">${d.label}</span><span class="log-conf">${pct(d.confidence)}%</span><span class="log-bar"><span class="log-fill sound" style="width:${pct(d.confidence)}%"></span></span></li>`
            ).join('');
        }

        // Create rule
        async function createRule() {
            const input = document.getElementById('commandInput');
            const cmd = input.value.trim();
            if (!cmd) return;
            const btn = document.getElementById('commandBtn');
            const fb = document.getElementById('commandFeedback');
            btn.textContent = '...';
            btn.disabled = true;
            try {
                const r = await fetch(API + '/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                if (r.ok) {
                    const resp = await r.json();
                    input.value = '';
                    fb.textContent = '✓ Rule "' + resp.rule_name + '" created';
                    updateActivity();
                } else {
                    fb.textContent = '✗ Failed';
                }
            } catch (e) { fb.textContent = '✗ Error'; }
            btn.textContent = 'Teach';
            btn.disabled = false;
            setTimeout(() => fb.textContent = '', 3000);
        }

        document.getElementById('commandBtn').addEventListener('click', createRule);
        document.getElementById('commandInput').addEventListener('keydown', e => { if (e.key === 'Enter') createRule(); });

        document.getElementById('videoFeed').addEventListener('error', function() { this.src = '/api/video?' + Date.now(); });

        // --- Charts ---
        function makeChart(canvasId, label, color) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            return new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{
                    label: label,
                    data: [],
                    borderColor: color,
                    backgroundColor: color + '22',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0,
                }]},
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 0 },
                    scales: {
                        x: { ticks: { color: '#555', maxTicksLimit: 8, font: { size: 9 } }, grid: { color: '#1a1a1a' } },
                        y: { ticks: { color: '#555', font: { size: 9 } }, grid: { color: '#1a1a1a' } },
                    },
                    plugins: { legend: { display: false } },
                },
            });
        }

        const tempChart = makeChart('tempChart', '°C', '#ff4444');
        const distChart = makeChart('distChart', 'cm', '#0088ff');

        async function updateChart(chart, topic) {
            const data = await fetchJSON('/api/timeseries?topic=' + topic + '&window=3600&bucket=30');
            if (!data || !data.length) return;
            const labels = data.map(d => new Date(d.timestamp * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
            chart.data.labels = labels;
            chart.data.datasets[0].data = data.map(d => d.avg);
            chart.update();
        }

        // Activity log
        async function updateActivity() {
            const data = await fetchJSON('/events?limit=30');
            if (!data) return;
            const list = document.getElementById('activityList');
            if (!data.length) { list.innerHTML = '<li class="empty">no activity yet</li>'; return; }
            list.innerHTML = data.reverse().map(e => {
                const d = e.data || {};
                const cls = e.topic === 'action_executed' ? 'action' : 'rule';
                const msg = d.message || d.name || JSON.stringify(d);
                return `<li class="activity-item"><span class="activity-time">${timeStr(e.timestamp)}</span><span class="activity-tag ${cls}">${e.topic.replace('_', ' ')}</span><span class="activity-msg">${msg}</span></li>`;
            }).join('');
        }

        // Poll loops
        setInterval(updateBadge, 1000);
        setInterval(updateObjectLog, 1000);
        setInterval(updateSoundLog, 1000);
        setInterval(() => updateChart(tempChart, 'sensor:temperature_c'), 5000);
        setInterval(() => updateChart(distChart, 'sensor:distance_cm'), 5000);
        setInterval(updateActivity, 2000);

        updateBadge();
        updateObjectLog();
        updateSoundLog();
        updateChart(tempChart, 'sensor:temperature_c');
        updateChart(distChart, 'sensor:distance_cm');
        updateActivity();
    </script>
</body>
</html>
