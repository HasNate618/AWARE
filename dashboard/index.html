<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWARE Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'SF Mono', 'Fira Code', monospace; background: #0a0a0a; color: #e0e0e0; }
        .header { background: #111; border-bottom: 1px solid #333; padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
        .header h1 { font-size: 18px; color: #00ff88; font-weight: 600; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; animation: pulse 2s infinite; }
        .status-dot.offline { background: #ff4444; animation: none; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; max-width: 1400px; margin: 0 auto; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
        .card { background: #111; border: 1px solid #333; border-radius: 8px; padding: 16px; }
        .card h2 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .empty { color: #555; font-style: italic; font-size: 13px; }

        /* Video feed */
        .video-wrap { position: relative; background: #000; border-radius: 4px; overflow: hidden; aspect-ratio: 4/3; }
        .video-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .video-badge { position: absolute; top: 8px; left: 8px; background: #00ff8822; color: #00ff88; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
        .video-badge.offline { background: #ff444422; color: #ff4444; }

        /* Detection list */
        .detection-list { list-style: none; max-height: 200px; overflow-y: auto; }
        .detection-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #222; font-size: 13px; }
        .detection-item:last-child { border-bottom: none; }
        .detection-label { color: #00ff88; font-weight: 600; }
        .confidence-bar { width: 50px; height: 4px; background: #222; border-radius: 2px; overflow: hidden; margin-left: 8px; display: inline-block; vertical-align: middle; }
        .confidence-fill { height: 100%; background: #00ff88; border-radius: 2px; }

        /* Detection log */
        .log-list { list-style: none; max-height: 400px; overflow-y: auto; font-size: 12px; }
        .log-item { display: flex; gap: 12px; padding: 5px 0; border-bottom: 1px solid #1a1a1a; align-items: baseline; }
        .log-time { color: #555; flex-shrink: 0; width: 80px; }
        .log-label { color: #00ff88; font-weight: 600; flex-shrink: 0; width: 100px; }
        .log-label.sound { color: #ffaa00; }
        .log-conf { color: #888; flex-shrink: 0; width: 45px; text-align: right; }
        .log-bar { flex: 1; min-width: 40px; }
        .log-bar-inner { height: 3px; background: #00ff8844; border-radius: 2px; }
        .log-bar-fill { height: 100%; background: #00ff88; border-radius: 2px; }

        /* Timeseries chart */
        .chart-wrap { height: 200px; position: relative; }
        .chart-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .chart-tab { background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 4px 12px; color: #888; font-size: 11px; cursor: pointer; font-family: inherit; }
        .chart-tab.active { background: #00ff8822; border-color: #00ff88; color: #00ff88; }

        /* Rules */
        .rule-list { list-style: none; }
        .rule-item { padding: 8px 0; border-bottom: 1px solid #222; }
        .rule-name { color: #00ff88; font-weight: 600; font-size: 13px; }
        .rule-when { color: #888; font-size: 12px; }
        .rule-then { color: #aaa; font-size: 12px; }
        .command-form { display: flex; gap: 8px; margin-top: 12px; }
        .command-input { flex: 1; background: #0a0a0a; border: 1px solid #333; border-radius: 4px; padding: 8px 12px; color: #e0e0e0; font-family: inherit; font-size: 13px; }
        .command-input:focus { outline: none; border-color: #00ff88; }
        .command-btn { background: #00ff88; color: #0a0a0a; border: none; border-radius: 4px; padding: 8px 16px; font-family: inherit; font-weight: 600; cursor: pointer; }
        .command-btn:hover { background: #00cc6a; }

        /* Events */
        .event-list { list-style: none; max-height: 300px; overflow-y: auto; }
        .event-item { padding: 6px 0; border-bottom: 1px solid #1a1a1a; font-size: 12px; }
        .event-time { color: #555; margin-right: 8px; }
        .event-topic { padding: 1px 6px; border-radius: 3px; font-size: 11px; margin-right: 8px; }
        .event-topic.action { background: #ff880022; color: #ffaa00; }
        .event-topic.rule { background: #00ff8822; color: #00ff88; }
        .event-topic.perception { background: #0088ff22; color: #0088ff; }
        .event-msg { color: #ccc; }
    </style>
</head>
<body>
    <div class="header">
        <div class="status-dot" id="statusDot"></div>
        <h1>AWARE</h1>
        <span id="statusText" style="color: #888; font-size: 12px;">connecting...</span>
    </div>

    <div class="grid">
        <!-- Video feed -->
        <div class="card" style="grid-column: 1 / -1;">
            <h2>Camera</h2>
            <div class="video-wrap">
                <img id="videoFeed" src="/api/video" alt="Camera feed">
                <div class="video-badge" id="cameraBadge">connecting...</div>
            </div>
        </div>

        <!-- Detection log -->
        <div class="card" style="grid-column: 1 / -1;">
            <h2>Detection Log</h2>
            <ul class="log-list" id="detectionLog">
                <li class="empty">waiting for detections...</li>
            </ul>
        </div>

        <!-- Timeseries chart -->
        <div class="card" style="grid-column: 1 / -1;">
            <h2>Time Series</h2>
            <div class="chart-tabs">
                <button class="chart-tab active" data-topic="sensor">Sensors</button>
                <button class="chart-tab" data-topic="detection">Objects</button>
                <button class="chart-tab" data-topic="sound">Sounds</button>
                <button class="chart-tab" data-topic="action_executed">Rules</button>
            </div>
            <div class="chart-wrap">
                <canvas id="timeseriesChart"></canvas>
            </div>
        </div>

        <!-- Current detections -->
        <div class="card">
            <h2>Live Detections</h2>
            <ul class="detection-list" id="detectionList">
                <li class="empty">nothing detected</li>
            </ul>
        </div>

        <!-- Rules -->
        <div class="card">
            <h2>Rules</h2>
            <ul class="rule-list" id="ruleList">
                <li class="empty">no rules yet</li>
            </ul>
            <div class="command-form">
                <input type="text" class="command-input" id="commandInput"
                       placeholder="e.g. when person detected, say hello">
                <button class="command-btn" id="commandBtn">Create</button>
            </div>
        </div>

        <!-- Events -->
        <div class="card" style="grid-column: 1 / -1;">
            <h2>Activity Log</h2>
            <ul class="event-list" id="eventList">
                <li class="empty">no events yet</li>
            </ul>
        </div>
    </div>

    <script>
        const API = window.location.origin;

        async function fetchJSON(path) {
            try {
                const r = await fetch(API + path);
                if (!r.ok) throw new Error(r.status);
                return await r.json();
            } catch (e) {
                return null;
            }
        }

        function setConnected(ok) {
            document.getElementById('statusDot').className = 'status-dot' + (ok ? '' : ' offline');
            document.getElementById('statusText').textContent = ok ? 'connected' : 'disconnected';
        }

        function timeStr(ts) {
            if (!ts) return '--';
            return new Date(ts * 1000).toLocaleTimeString();
        }

        function confPct(conf) { return Math.round(conf * 100); }

        // Live detections (current frame)
        async function updateDetections() {
            const data = await fetchJSON('/api/snapshot');
            if (!data) { setConnected(false); return; }
            setConnected(true);

            const badge = document.getElementById('cameraBadge');
            badge.textContent = data.source;
            badge.className = 'video-badge' + (data.source.includes('unavailable') || data.source === 'mock_camera' ? ' offline' : '');

            const list = document.getElementById('detectionList');
            const all = [...(data.detections || []), ...(data.sounds || []).map(s => ({...s, _sound: true}))];
            if (all.length === 0) {
                list.innerHTML = '<li class="empty">nothing detected</li>';
                return;
            }
            list.innerHTML = all.map(d => {
                const pct = confPct(d.confidence);
                return `<li class="detection-item${d._sound ? ' sound-item' : ''}">
                    <span class="detection-label">${d.label}</span>
                    <span class="confidence-bar"><span class="confidence-fill" style="width:${pct}%"></span></span>
                    <span style="color:#888;font-size:12px;margin-left:6px">${pct}%</span>
                </li>`;
            }).join('');
        }

        // Detection history log
        async function updateDetectionLog() {
            const data = await fetchJSON('/api/detections?limit=50');
            if (!data || data.length === 0) return;
            const list = document.getElementById('detectionLog');
            list.innerHTML = data.reverse().map(d => {
                const pct = confPct(d.confidence);
                const isSound = d.source === 'mic' || (!d.bbox && d.label);
                return `<li class="log-item">
                    <span class="log-time">${timeStr(d.timestamp)}</span>
                    <span class="log-label ${isSound ? 'sound' : ''}">${d.label}</span>
                    <span class="log-conf">${pct}%</span>
                    <span class="log-bar"><span class="log-bar-inner"><span class="log-bar-fill" style="width:${pct}%"></span></span></span>
                </li>`;
            }).join('');
        }

        // Rules
        async function updateRules() {
            const data = await fetchJSON('/rules');
            if (!data) return;
            const list = document.getElementById('ruleList');
            if (data.length === 0) {
                list.innerHTML = '<li class="empty">no rules yet</li>';
                return;
            }
            list.innerHTML = data.map(r =>
                `<li class="rule-item">
                    <div class="rule-name">${r.name}</div>
                    <div class="rule-when">when: ${r.when_text}</div>
                    <div class="rule-then">then: ${r.then_text}</div>
                </li>`
            ).join('');
        }

        // Activity log with descriptive messages
        async function updateEvents() {
            const data = await fetchJSON('/events?limit=30');
            if (!data) return;
            const list = document.getElementById('eventList');
            if (data.length === 0) {
                list.innerHTML = '<li class="empty">no events yet</li>';
                return;
            }
            list.innerHTML = data.reverse().map(e => {
                const d = e.data || {};
                const topicClass = e.topic === 'action_executed' ? 'action' :
                                   e.topic === 'rule_created' ? 'rule' : 'perception';
                const msg = d.message || d.name || JSON.stringify(d);
                return `<li class="event-item">
                    <span class="event-time">${new Date(e.timestamp * 1000).toLocaleTimeString()}</span>
                    <span class="event-topic ${topicClass}">${e.topic.replace('_', ' ')}</span>
                    <span class="event-msg">${msg}</span>
                </li>`;
            }).join('');
        }

        // Create rule
        async function createRule() {
            const input = document.getElementById('commandInput');
            const cmd = input.value.trim();
            if (!cmd) return;
            const btn = document.getElementById('commandBtn');
            btn.textContent = '...';
            btn.disabled = true;
            try {
                const r = await fetch(API + '/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                if (r.ok) { input.value = ''; updateRules(); updateEvents(); }
            } catch (e) {}
            btn.textContent = 'Create';
            btn.disabled = false;
        }

        document.getElementById('commandBtn').addEventListener('click', createRule);
        document.getElementById('commandInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') createRule();
        });

        // Video feed error handling
        document.getElementById('videoFeed').addEventListener('error', function() {
            this.src = '/api/video?' + Date.now();
        });

        // Timeseries chart
        let chart = null;
        let currentTopic = 'sensor';

        function initChart() {
            const ctx = document.getElementById('timeseriesChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 0 },
                    scales: {
                        x: {
                            ticks: { color: '#555', maxTicksLimit: 10, font: { size: 10 } },
                            grid: { color: '#1a1a1a' },
                        },
                        y: {
                            ticks: { color: '#555', font: { size: 10 } },
                            grid: { color: '#1a1a1a' },
                        },
                    },
                    plugins: {
                        legend: {
                            labels: { color: '#888', font: { size: 10 }, boxWidth: 12 },
                        },
                    },
                },
            });
        }

        const COLORS = ['#00ff88', '#ffaa00', '#0088ff', '#ff4444', '#aa66ff', '#ff66aa', '#00cccc', '#ff88cc'];

        async function updateTimeseries() {
            if (!chart) return;
            const all = await fetchJSON('/api/timeseries/all?window=3600&bucket=30');
            if (!all) { chart.update(); return; }

            const streamData = all[currentTopic] || [];
            const datasets = [];
            let labels = [];
            let colorIdx = 0;

            for (const series of streamData) {
                const color = COLORS[colorIdx % COLORS.length];
                colorIdx++;
                const points = series.data || [];
                if (points.length > 0 && labels.length === 0) {
                    labels = points.map(d => {
                        const dt = new Date(d.timestamp * 1000);
                        return dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    });
                }
                if (currentTopic === 'sensor') {
                    datasets.push({
                        label: series.label,
                        data: points.map(d => d.avg),
                        borderColor: color,
                        backgroundColor: color + '22',
                        fill: false,
                        tension: 0.3,
                        pointRadius: 0,
                        borderWidth: 2,
                    });
                } else {
                    datasets.push({
                        label: series.label,
                        data: points.map(d => d.count),
                        borderColor: color,
                        backgroundColor: color + '22',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0,
                    });
                }
            }

            chart.data.labels = labels;
            chart.data.datasets = datasets;
            chart.update();
        }

        // Chart tab switching
        document.querySelectorAll('.chart-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTopic = tab.dataset.topic;
                updateTimeseries();
            });
        });

        initChart();

        // Poll loops
        setInterval(updateDetections, 500);
        setInterval(updateDetectionLog, 1000);
        setInterval(updateRules, 3000);
        setInterval(updateEvents, 2000);
        setInterval(updateTimeseries, 5000);

        // Initial load
        updateDetections();
        updateDetectionLog();
        updateRules();
        updateEvents();
        updateTimeseries();
    </script>
</body>
</html>
